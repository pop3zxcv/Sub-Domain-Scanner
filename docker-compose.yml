services:
  backend:
    build: ./backend
    container_name: subsentry-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PYTHONUNBUFFERED=1
    # nmap inside the container needs NET_RAW + NET_ADMIN for raw socket scans
    cap_add:
      - NET_RAW
      - NET_ADMIN

  frontend:
    build: ./frontend
    container_name: subsentry-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
